# HIS 백엔드 공통 설정 — 사이드바 API 관련 항목

# 프론트 Axios.ts baseURL 과 동일 포트 (http://localhost:8081)
server:
  port: 8081

spring:
  datasource:
    # Oracle XE — MenuMapper.xml 이 HOSPITAL.CMH_AUTH_MENU 조회
    url: jdbc:oracle:thin:@localhost:1521:XE
    username: hospital
    password: "1111"
    driver-class-name: oracle.jdbc.OracleDriver

mybatis:
  # MenuMapper.xml 위치 — selectAllMenus SQL
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # DB MENU_ID → Java id 등 camelCase 자동 매핑
    map-underscore-to-camel-case: true
